<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="금융 자산 기록 대시보드 - 토스 스타일의 자산 관리 및 투자 현황 대시보드" />
  <title>금융 자산 기록 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">₩</div>
      <h1 class="login-title">내 자산 대시보드</h1>
      <p class="login-desc">금융 자산을 한눈에 관리하세요</p>
      <button id="btn-google-login" class="btn-google-login">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Google로 로그인
      </button>
      <button id="btn-guest" class="btn-guest">게스트로 둘러보기</button>
      <p class="login-note">데이터는 로그인 시 클라우드에 안전하게 저장됩니다</p>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- Mobile Header -->
    <header class="mobile-header" id="mobile-header">
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <span class="mobile-header-title">내 자산</span>
    </header>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">₩</div>
          <span class="logo-text">내 자산</span>
        </div>
      </div>
      <ul class="nav-list">
        <li class="nav-item active" data-section="summary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>자산 요약</span>
        </li>
        <li class="nav-item" data-section="portfolio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a10 10 0 0 1 10 10" />
            <path d="M12 2v10l7.07 7.07" />
          </svg>
          <span>주식 계좌</span>
        </li>
        <li class="nav-item" data-section="trading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          <span>거래 기록</span>
        </li>
        <li class="nav-item" data-section="dividend">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg>
          <span>배당 기록</span>
        </li>
        <li class="nav-item" data-section="spending">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <span>지출 관리</span>
        </li>
        <li class="nav-item" data-section="income">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
          <span>수입 내역</span>
        </li>
        <li class="nav-item" data-section="forecast">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
            <polyline points="17 6 23 6 23 12" />
          </svg>
          <span>자산 예상</span>
        </li>
        <li class="nav-item" data-section="market">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <span>참고 자료</span>
        </li>
        <li class="nav-item" data-section="data">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <span>데이터 관리</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="user-info" class="user-info" style="display:none">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <span id="user-name" class="user-name"></span>
          <button id="btn-logout" class="btn-logout" title="로그아웃">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
        <div class="update-info" id="update-time">데이터 로딩 중...</div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Loading State -->
      <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>데이터를 불러오는 중...</p>
        </div>
      </div>

      <!-- Section: Summary -->
      <section id="section-summary" class="section active"></section>

      <!-- Section: Portfolio -->
      <section id="section-portfolio" class="section"></section>

      <!-- Section: Trading -->
      <section id="section-trading" class="section"></section>

      <!-- Section: Dividend -->
      <section id="section-dividend" class="section"></section>

      <!-- Section: Spending -->
      <section id="section-spending" class="section"></section>

      <!-- Section: Income -->
      <section id="section-income" class="section"></section>

      <!-- Section: Forecast -->
      <section id="section-forecast" class="section"></section>

      <!-- Section: Market -->
      <section id="section-market" class="section"></section>

      <!-- Section: Data Management -->
      <section id="section-data" class="section"></section>
    </main>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
